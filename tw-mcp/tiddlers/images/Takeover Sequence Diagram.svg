<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 980" font-family="Consolas, monospace" font-size="11">
  <defs>
    <marker id="ar" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#555"/>
    </marker>
    <marker id="ar-b" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#47a"/>
    </marker>
    <marker id="ar-g" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#4a4"/>
    </marker>
    <marker id="ar-o" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#d80"/>
    </marker>
    <marker id="ar-r" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#c44"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="390" y="22" text-anchor="middle" font-weight="bold" font-size="14" fill="#333">MCP Takeover Sequence: --mcp then --mcp listen</text>

  <!-- Column positions: A=120, B=320, Pipe=510, FS=680 -->

  <!-- ════ Column headers ════ -->
  <rect x="55" y="40" width="130" height="44" rx="5" fill="#eef8ee" stroke="#696" stroke-width="1.5"/>
  <text x="120" y="58" text-anchor="middle" font-weight="bold" font-size="12" fill="#363">Process A</text>
  <text x="120" y="74" text-anchor="middle" fill="#666" font-size="10">--mcp</text>

  <rect x="255" y="40" width="130" height="44" rx="5" fill="#fff5ee" stroke="#b84" stroke-width="1.5"/>
  <text x="320" y="58" text-anchor="middle" font-weight="bold" font-size="12" fill="#743">Process B</text>
  <text x="320" y="74" text-anchor="middle" fill="#666" font-size="10">--mcp listen</text>

  <rect x="445" y="40" width="130" height="44" rx="5" fill="#e8eef8" stroke="#668" stroke-width="1.5"/>
  <text x="510" y="58" text-anchor="middle" font-weight="bold" font-size="12" fill="#336">Named Pipe</text>
  <text x="510" y="74" text-anchor="middle" fill="#666" font-size="10">IPC transport</text>

  <rect x="615" y="40" width="130" height="44" rx="5" fill="#f0f0f0" stroke="#999" stroke-width="1.5"/>
  <text x="680" y="58" text-anchor="middle" font-weight="bold" font-size="12" fill="#555">.tw-mcp/</text>
  <text x="680" y="74" text-anchor="middle" fill="#666" font-size="10">connect file</text>

  <!-- ════ Lifelines ════ -->
  <line x1="120" y1="84" x2="120" y2="940" stroke="#696" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="320" y1="84" x2="320" y2="940" stroke="#b84" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="510" y1="84" x2="510" y2="940" stroke="#668" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="680" y1="84" x2="680" y2="940" stroke="#999" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ════════ Step 1: A starts as primary ════════ -->
  <rect x="4" y="100" width="8" height="16" rx="2" fill="#696"/>
  <text x="18" y="112" font-weight="bold" font-size="11" fill="#336">1</text>

  <!-- A activation bar -->
  <rect x="114" y="100" width="12" height="60" rx="2" fill="#eef8ee" stroke="#696" stroke-width="1"/>

  <line x1="126" y1="110" x2="504" y2="110" stroke="#4a4" stroke-width="1.5" marker-end="url(#ar-g)"/>
  <text x="315" y="106" text-anchor="middle" fill="#4a4" font-size="10">starts pipe server</text>

  <line x1="126" y1="130" x2="674" y2="130" stroke="#47a" stroke-width="1.5" marker-end="url(#ar-b)"/>
  <text x="400" y="126" text-anchor="middle" fill="#47a" font-size="10">writes {pipe, token, PID}</text>

  <text x="120" y="155" text-anchor="middle" fill="#363" font-weight="bold" font-size="10">PRIMARY</text>

  <!-- ════════ Step 2: B starts, detects connect, joins as proxy ════════ -->
  <rect x="4" y="180" width="8" height="16" rx="2" fill="#b84"/>
  <text x="18" y="192" font-weight="bold" font-size="11" fill="#743">2</text>

  <!-- B activation bar -->
  <rect x="314" y="180" width="12" height="100" rx="2" fill="#fff5ee" stroke="#b84" stroke-width="1"/>

  <line x1="674" y1="190" x2="326" y2="190" stroke="#47a" stroke-width="1.5" marker-end="url(#ar-b)"/>
  <text x="500" y="186" text-anchor="middle" fill="#47a" font-size="10">reads connect file</text>

  <line x1="314" y1="210" x2="126" y2="210" stroke="#4a4" stroke-width="1.5" marker-end="url(#ar-g)"/>
  <text x="220" y="206" text-anchor="middle" fill="#4a4" font-size="10">pipe connect</text>

  <line x1="314" y1="230" x2="126" y2="230" stroke="#47a" stroke-width="1.5" marker-end="url(#ar-b)"/>
  <text x="220" y="226" text-anchor="middle" fill="#47a" font-size="10">authenticate (token)</text>

  <text x="320" y="255" text-anchor="middle" fill="#743" font-weight="bold" font-size="10">PROXY</text>

  <!-- B starts HTTP -->
  <rect x="314" y="268" width="12" height="20" rx="2" fill="#fef0e8" stroke="#b84" stroke-width="1"/>
  <text x="335" y="282" fill="#743" font-size="10">starts HTTP :8080</text>

  <!-- ════════ Step 3: B detects httpServer, sends takeover request ════════ -->
  <rect x="4" y="310" width="8" height="16" rx="2" fill="#d80"/>
  <text x="18" y="322" font-weight="bold" font-size="11" fill="#d80">3</text>

  <rect x="314" y="310" width="12" height="30" rx="2" fill="#fff5ee" stroke="#b84" stroke-width="1"/>
  <rect x="114" y="310" width="12" height="30" rx="2" fill="#eef8ee" stroke="#696" stroke-width="1"/>

  <text x="320" y="308" text-anchor="middle" fill="#d80" font-size="10" font-weight="bold">detects $tw.httpServer</text>

  <line x1="314" y1="325" x2="126" y2="325" stroke="#d80" stroke-width="2" marker-end="url(#ar-o)"/>
  <text x="220" y="321" text-anchor="middle" fill="#d80" font-size="10">takeover-request {pid, label}</text>

  <!-- ════════ Step 4: A broadcasts, cleans up, steps down ════════ -->
  <rect x="4" y="365" width="8" height="16" rx="2" fill="#c44"/>
  <text x="18" y="377" font-weight="bold" font-size="11" fill="#933">4</text>

  <rect x="114" y="365" width="12" height="145" rx="2" fill="#f0f0f0" stroke="#999" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- A broadcasts takeover to all clients via pipe -->
  <line x1="126" y1="380" x2="504" y2="380" stroke="#d80" stroke-width="2" marker-end="url(#ar-o)"/>
  <text x="315" y="376" text-anchor="middle" fill="#d80" font-size="10">broadcast: takeover {pid}</text>

  <!-- pipe relays to B -->
  <line x1="504" y1="400" x2="326" y2="400" stroke="#d80" stroke-width="1.5" marker-end="url(#ar-o)"/>
  <text x="415" y="396" text-anchor="middle" fill="#d80" font-size="10">takeover notify</text>

  <!-- A deletes connect file -->
  <line x1="126" y1="425" x2="674" y2="425" stroke="#c44" stroke-width="1.5" marker-end="url(#ar-r)"/>
  <text x="400" y="421" text-anchor="middle" fill="#c44" font-size="10">deletes connect file</text>

  <!-- A destroys pipe clients -->
  <line x1="126" y1="450" x2="504" y2="450" stroke="#c44" stroke-width="1.5" marker-end="url(#ar-r)"/>
  <text x="315" y="446" text-anchor="middle" fill="#c44" font-size="10">destroy sockets, close pipe server</text>

  <!-- pipe disconnects from B -->
  <line x1="504" y1="470" x2="326" y2="470" stroke="#c44" stroke-width="1.5" marker-end="url(#ar-r)"/>
  <text x="415" y="466" text-anchor="middle" fill="#c44" font-size="10">pipe disconnect</text>

  <text x="120" y="500" text-anchor="middle" fill="#999" font-size="10">stepping down...</text>
  <text x="120" y="514" text-anchor="middle" fill="#999" font-size="10">polls for new connect</text>

  <!-- ════════ Step 5: B becomes primary ════════ -->
  <rect x="4" y="535" width="8" height="16" rx="2" fill="#4a4"/>
  <text x="18" y="547" font-weight="bold" font-size="11" fill="#363">5</text>

  <rect x="314" y="535" width="12" height="100" rx="2" fill="#eef8ee" stroke="#696" stroke-width="2"/>

  <!-- B generates token -->
  <rect x="330" y="545" width="150" height="16" rx="3" fill="#eef8ee" stroke="#696" stroke-width="1"/>
  <text x="405" y="556" text-anchor="middle" fill="#363" font-size="10">new auth token</text>

  <!-- B starts pipe server -->
  <line x1="326" y1="575" x2="504" y2="575" stroke="#4a4" stroke-width="1.5" marker-end="url(#ar-g)"/>
  <text x="415" y="571" text-anchor="middle" fill="#4a4" font-size="10">starts pipe server</text>

  <!-- B writes new connect file -->
  <line x1="326" y1="600" x2="674" y2="600" stroke="#4a4" stroke-width="1.5" marker-end="url(#ar-g)"/>
  <text x="500" y="596" text-anchor="middle" fill="#4a4" font-size="10">writes new {pipe, token, PID}</text>

  <!-- B switches stdin mode -->
  <rect x="330" y="615" width="150" height="16" rx="3" fill="#eef8ee" stroke="#696" stroke-width="1"/>
  <text x="405" y="626" text-anchor="middle" fill="#363" font-size="10">stdin: relay → dispatch</text>

  <text x="320" y="650" text-anchor="middle" fill="#363" font-weight="bold" font-size="11">PRIMARY</text>

  <!-- ════════ Step 6: A reconnects as proxy ════════ -->
  <rect x="4" y="670" width="8" height="16" rx="2" fill="#47a"/>
  <text x="18" y="682" font-weight="bold" font-size="11" fill="#336">6</text>

  <rect x="114" y="670" width="12" height="80" rx="2" fill="#fff5ee" stroke="#b84" stroke-width="1.5"/>

  <!-- A finds new connect file -->
  <line x1="674" y1="685" x2="126" y2="685" stroke="#47a" stroke-width="1.5" marker-end="url(#ar-b)"/>
  <text x="400" y="681" text-anchor="middle" fill="#47a" font-size="10">reads new connect file</text>

  <!-- A connects to B's pipe -->
  <line x1="126" y1="710" x2="504" y2="710" stroke="#4a4" stroke-width="1.5" marker-end="url(#ar-g)"/>
  <text x="315" y="706" text-anchor="middle" fill="#4a4" font-size="10">pipe connect</text>

  <line x1="504" y1="710" x2="314" y2="710" stroke="#4a4" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- A authenticates -->
  <line x1="126" y1="730" x2="504" y2="730" stroke="#47a" stroke-width="1.5" marker-end="url(#ar-b)"/>
  <text x="315" y="726" text-anchor="middle" fill="#47a" font-size="10">authenticate (B's token)</text>

  <text x="120" y="765" text-anchor="middle" fill="#743" font-weight="bold" font-size="11">PROXY</text>

  <!-- ════════ Result ════════ -->
  <rect x="40" y="800" width="700" height="130" rx="8" fill="#f8f8fa" stroke="#ccc" stroke-width="1"/>

  <!-- Final state: A as proxy -->
  <rect x="60" y="820" width="130" height="44" rx="5" fill="#fff5ee" stroke="#b84" stroke-width="1.5"/>
  <text x="125" y="838" text-anchor="middle" font-weight="bold" font-size="11" fill="#743">Process A</text>
  <text x="125" y="854" text-anchor="middle" fill="#743" font-size="10">PROXY</text>

  <!-- arrow A → pipe → B -->
  <line x1="190" y1="842" x2="438" y2="842" stroke="#47a" stroke-width="1.5" marker-end="url(#ar-b)"/>
  <text x="314" y="836" text-anchor="middle" fill="#47a" font-size="10">relays via pipe</text>

  <!-- Final state: B as primary -->
  <rect x="445" y="812" width="130" height="60" rx="5" fill="#eef8ee" stroke="#696" stroke-width="2"/>
  <text x="510" y="832" text-anchor="middle" font-weight="bold" font-size="11" fill="#363">Process B</text>
  <text x="510" y="848" text-anchor="middle" fill="#363" font-size="10">PRIMARY</text>
  <text x="510" y="864" text-anchor="middle" fill="#484" font-size="10">HTTP + MCP</text>

  <!-- B owns wiki -->
  <rect x="610" y="820" width="110" height="44" rx="5" fill="#eef8ee" stroke="#696" stroke-width="1.5"/>
  <text x="665" y="838" text-anchor="middle" font-weight="bold" font-size="11" fill="#363">$tw.wiki</text>
  <text x="665" y="854" text-anchor="middle" fill="#484" font-size="10">shared store</text>

  <line x1="575" y1="842" x2="608" y2="842" stroke="#696" stroke-width="1.5" marker-end="url(#ar-g)"/>

  <text x="390" y="906" text-anchor="middle" fill="#363" font-weight="bold" font-size="12">Browser edits and MCP tool calls share the same wiki store</text>

  <!-- Legend -->
  <rect x="40" y="930" width="700" height="24" rx="4" fill="none"/>
  <line x1="55" y1="945" x2="80" y2="945" stroke="#4a4" stroke-width="1.5" marker-end="url(#ar-g)"/>
  <text x="86" y="949" fill="#333" font-size="9">connect/create</text>
  <line x1="195" y1="945" x2="220" y2="945" stroke="#47a" stroke-width="1.5" marker-end="url(#ar-b)"/>
  <text x="226" y="949" fill="#333" font-size="9">read/message</text>
  <line x1="325" y1="945" x2="350" y2="945" stroke="#d80" stroke-width="1.5" marker-end="url(#ar-o)"/>
  <text x="356" y="949" fill="#333" font-size="9">takeover signal</text>
  <line x1="465" y1="945" x2="490" y2="945" stroke="#c44" stroke-width="1.5" marker-end="url(#ar-r)"/>
  <text x="496" y="949" fill="#333" font-size="9">disconnect/delete</text>
</svg>
